<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>67</title>

<link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Dancing+Script&display=swap" rel="stylesheet">

<style>
:root{
  --pink:#ff7eb6;
  --light:#ffc0df;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background: radial-gradient(circle, #ffd6ec, #ffb6d9);
  overflow:hidden;
  font-family:'Gloria Hallelujah', cursive;
  position:relative;
  perspective:1200px;
}

/* SCREENS */
.screen{
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:all 0.8s ease;
}
.hidden{opacity:0;pointer-events:none;}

/* BOX */
.box{
  border:2px solid var(--light);
  padding:12px 20px;
  border-radius:15px;
  box-shadow:0 0 20px var(--light);
  margin-bottom:15px;
  color:var(--pink);
  font-size:20px;
  min-width:150px;
  text-align:center;
}

/* BUTTON */
button{
  padding:8px 20px;
  border-radius:20px;
  border:2px solid var(--light);
  background:transparent;
  color:var(--pink);
  font-size:20px;
  cursor:pointer;
  box-shadow:0 0 12px var(--light);
  transition:0.4s;
  margin:0 8px;
}
button:hover{transform:scale(1.05);}

/* ENVELOPE */
.envelope{
  width:160px;
  height:110px;
  background:#ffc0df;
  border-radius:10px;
  position:relative;
  box-shadow:0 0 20px var(--light);
  transform-style:preserve-3d;
  animation:shakeEnvelope 1.5s infinite;
}
@keyframes shakeEnvelope{
  0%,100%{transform:translateX(0) rotate(0deg);}
  25%{transform:translateX(-2px) rotate(-1deg);}
  50%{transform:translateX(2px) rotate(1deg);}
  75%{transform:translateX(-1px) rotate(-0.5deg);}
}
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff9ecf;
  clip-path:polygon(0 0, 50% 50%, 100% 0);
  transform-origin:top;
  transition:0.8s;
  transform-style:preserve-3d;
}
.open .flap{transform:rotateX(180deg);}

/* LETTER */
.letter{
  width:85%;
  max-width:320px;
  height:45vh;
  background:#ffe4f2;
  border-radius:10px;
  box-shadow:0 0 20px var(--light);
  padding:15px;
  overflow-y:auto;
  font-family:'Dancing Script', cursive;
  color:var(--pink);
  font-size:16px;
  line-height:1.5;
  white-space:pre-wrap;
  display:none;
  transform:translateY(-15%) rotateX(0deg);
  transform-style:preserve-3d;
  transition:1s;
}

/* FLOATING LETTER EFFECT */
.floatLetter{
  animation:floatLetter 3s ease-in-out infinite alternate;
}
@keyframes floatLetter{
  0%{transform:translateY(-15%) rotateX(0deg) rotateZ(-1deg);}
  50%{transform:translateY(-14%) rotateX(0deg) rotateZ(1deg);}
  100%{transform:translateY(-15%) rotateX(0deg) rotateZ(-1deg);}
}

/* CLOSE HEART */
.closeHeart{
  position:absolute;
  top:calc(50% + 120px); /* below letter */
  left:50%;
  transform:translateX(-50%);
  font-size:30px;
  cursor:pointer;
  color:var(--pink);
  text-shadow:0 0 15px var(--light);
  animation:beat 1s infinite;
  display:none;
}

/* HEART */
.heart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:25px;
  cursor:pointer;
  color:var(--pink);
  text-shadow:0 0 15px var(--light);
  animation:beat 1s infinite;
}

/* WHITE SCREEN */
.white{
  background:white;
  color:var(--pink);
  font-size:18px;
  text-align:center;
  padding:0 10px;
  word-break:normal;
}

/* CURSOR LIGHT */
.cursorLight{
  position:absolute;
  width:100px;
  height:100px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,126,182,0.3), rgba(255,126,182,0));
  pointer-events:none;
  mix-blend-mode:screen;
}

/* FLOATING HEARTS */
.floatingHeart{
  position:absolute;
  color:var(--pink);
  font-size:16px;
  animation:float 1s forwards;
  pointer-events:none;
}
@keyframes float{0%{opacity:1; transform:translateY(0) scale(1);}100%{opacity:0; transform:translateY(-35px) scale(1.2);}}
</style>
</head>
<body>

<!-- SCREEN 1 -->
<div id="s1" class="screen">
  <div class="box">Please open me...</div>
  <div>
    <button id="yes">Okay</button>
    <button id="no">No</button>
  </div>
</div>

<!-- SCREEN 2 -->
<div id="s2" class="screen hidden white">
  <div id="msg"></div>
</div>

<!-- SCREEN 3 -->
<div id="s3" class="screen hidden white">
  <div id="msg2"></div>
</div>

<!-- SCREEN 4 -->
<div id="s4" class="screen hidden">
  <div class="envelope" id="env">
    <div class="flap"></div>
    <div class="heart" id="open">❤</div>
  </div>
  <div class="letter" id="letter">
    <div class="text" id="text"></div>
  </div>
  <div class="closeHeart" id="close">❤</div>
</div>

<!-- FINAL SCREEN -->
<div id="s5" class="screen hidden white">
  <div id="endMsg"></div>
</div>

<div class="cursorLight" id="cursorLight"></div>

<script>
let s1=document.getElementById("s1"),
    s2=document.getElementById("s2"),
    s3=document.getElementById("s3"),
    s4=document.getElementById("s4"),
    s5=document.getElementById("s5"),
    noBtn=document.getElementById("no"),
    yesBtn=document.getElementById("yes"),
    msg=document.getElementById("msg"),
    msg2=document.getElementById("msg2"),
    env=document.getElementById("env"),
    letter=document.getElementById("letter"),
    openBtn=document.getElementById("open"),
    closeBtn=document.getElementById("close"),
    text=document.getElementById("text"),
    endMsg=document.getElementById("endMsg"),
    cursorLight=document.getElementById("cursorLight");

let clicks=0;

/* CURSOR LIGHT */
document.addEventListener('mousemove', e=>{
  cursorLight.style.left=e.clientX-50+'px';
  cursorLight.style.top=e.clientY-50+'px';
});
document.addEventListener('touchmove', e=>{
  cursorLight.style.left=e.touches[0].clientX-50+'px';
  cursorLight.style.top=e.touches[0].clientY-50+'px';
});

/* FLOATING HEART */
function createHeart(x,y){
  let h=document.createElement('div');
  h.className='floatingHeart';
  h.style.left=x+'px';
  h.style.top=y+'px';
  h.innerText='❤';
  document.body.appendChild(h);
  setTimeout(()=>{h.remove()},1000);
}

/* SAFE AREAS FOR NO BUTTON */
function moveNoButton(){
  clicks++;
  createHeart(noBtn.offsetLeft,noBtn.offsetTop);
  noBtn.style.position="absolute";
  // far corners only
  const top = Math.random()<0.5 ? 10 : 70;
  const left = Math.random()<0.5 ? 10 : 70;
  noBtn.style.top=top+"%";
  noBtn.style.left=left+"%";
  noBtn.style.transform=`scale(${1-clicks*0.15})`;
  if(clicks>=4) noBtn.style.display="none";
}
noBtn.onclick=moveNoButton;

/* TYPE EFFECT */
function typeText(str, el, speed, cb){
  el.innerHTML="";
  let i=0;
  let cursor=document.createElement("span");
  cursor.className="cursor";
  el.appendChild(cursor);
  let int=setInterval(()=>{
    cursor.insertAdjacentText("beforebegin",str[i]);
    i++;
    if(i>=str.length){clearInterval(int);if(cb) cb();}
  },speed);
}

/* SCREEN FLOW */
yesBtn.onclick=()=>{
  createHeart(yesBtn.offsetLeft,yesBtn.offsetTop);
  s1.classList.add("hidden");
  s2.classList.remove("hidden");
  typeText("Alessi, this is for you.", msg, 100, ()=>{
    setTimeout(()=>{
      s2.classList.add("hidden");
      s3.classList.remove("hidden");
      typeText("Please take your time in reading.", msg2,100,()=>{
        setTimeout(()=>{
          s3.classList.add("hidden");
          s4.classList.remove("hidden");
          openBtn.style.display="block";
          closeBtn.style.display="none";
          letter.style.display="none";
        },1200);
      });
    },1200);
  });
};

/* OPEN LETTER */
openBtn.onclick=()=>{
  env.classList.add("open");
  letter.style.display="block";
  letter.classList.add("floatLetter");
  closeBtn.style.display="block";
  openBtn.style.display="none";
  typeText(`Heyo,

Congratulations on graduating and moving up to 10th grade! Just by showing up and giving your best, you’ve already proven how strong you are. Life isn’t always easy, but every effort you put in matters—and it doesn’t go unnoticed.

Remember to take care of yourself along the way. Rest when you need to, be kind to yourself, and keep believing in your own strength. You are important, and your hard work will open new doors for amazing experiences ahead.

Good luck in this next chapter, Sayang. Keep going, stay brave, and know that you are truly seen and appreciated.

— Always proud of you, Bambi's friend`, text, 30);
};

/* CLOSE LETTER */
closeBtn.onclick=()=>{
  letter.style.display="none";
  letter.classList.remove("floatLetter");
  env.classList.remove("open");
  openBtn.style.display="block";
  closeBtn.style.display="none";
  setTimeout(()=>{
    s4.classList.add("hidden");
    s5.classList.remove("hidden");
    endMsg.innerText="I will be here for you. Always and in all ways.";
  },800);
};
</script>
</body>
</html>
